#     image: ubuntu:22.04
#     build: ./cpt-env
#     hostname: cptenv
#     container_name: cpt-env
#     tty: true
#     volumes:
#       - ./share/:/share/
#     depends_on:
#       - influxdb

volumes:
    grafana-home:
    grafana-conf:
    jenkins-home:
    docker-dind:
    influxdb:
