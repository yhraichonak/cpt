version: '1'
services:
   todo-app:
    hostname: testapp
    build:
      context: ./app
    depends_on:
      - todo-database
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000
      - 35729:35729
    volumes:
      - ./share/:/share/
    develop:
      watch:
        - path: ./app/package.json
          action: rebuild
        - path: ./app
          target: /usr/src/app
          action: sync
   todo-database:
     hostname: testdb
     build: ./db
     depends_on:
       - influxdb
     ports:
       - 27017:27017
     volumes:
       - ./share/:/share/
     tty: true
   grafana:
     hostname: grafana
     container_name: grafana
     links:
       - influxdb:influxdb
     depends_on:
       - influxdb
     image: grafana/grafana
     build: ./grafana
     user: "104"
     ports:
       - "4000:3000"
     environment:
       - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
     volumes:
       - ./grafana/provisioning/:/etc/grafana/provisioning/
       - ./share/:/share/
     restart: always
   influxdb:
     image: influxdb
     hostname: influxdb
     build: ./influxdb
     container_name: influxdb
     volumes:
       - ./share/:/share/
     ports:
       - "8086:8086"
     expose:
        - 8086
     restart: always
   jenkins:
      image: jenkins/jenkins
      build: ./jenkins
      container_name: jenkins
      ports:
       - "8080:8080"
       - "50000:50000"
      environment:
      - JENKINS_ADMIN_LOGIN=admin
      - JENKINS_ADMIN_PASSWORD=admin
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
#        - ./jenkins_home:/var/jenkins_home
        - jenkins-home:/var/jenkins_home
        - ./share/:/share/
      restart: always
   octoperf:
      image: octoperf/docker-agent:14.4.1
      build: ./octoperf
      hostname: octoperf
      container_name: octoperf_agent
      environment:
        - SERVER_URL=https://api.octoperf.com:443
        - AGENT_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..7d8nyZuJWt7wMKZ-8lvip1NaWDEetMtZMQN5QkhcNBE
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
      restart: unless-stopped
#
